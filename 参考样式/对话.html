<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>蓝链 | 全局演示</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600&family=Inter:wght@400;500;600&display=swap');
        body { background: #FFFFFF; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .mobile-shell { width: 393px; height: 854px; background: #FDFBF7; border-radius: 44px; overflow: hidden; position: relative; border: 8px solid #000; }
        .view { display: none; height: 100%; position: absolute; top: 0; left: 0; right: 0; padding-top: 100px; overflow-y: auto; }
        .status-bar { height: 48px; padding: 0 24px; display: flex; align-items: center; justify-content: space-between; font-size: 14px; font-family: -apple-system, BlinkMacSystemFont, sans-serif; position: absolute; top: 0; left: 0; right: 0; z-index: 30; }
        .status-bar .time { font-weight: 600; }
        .status-bar .right-icons { display: flex; align-items: center; gap: 6px; }
        .status-bar .signal-bars { display: flex; align-items: flex-end; gap: 2px; height: 12px; }
        .status-bar .signal-bar { width: 3px; background: #333; border-radius: 1px; }
        .status-bar .battery { display: flex; align-items: center; gap: 2px; }
        .status-bar .battery-icon { width: 20px; height: 10px; border: 1.5px solid #333; border-radius: 2px; position: relative; }
        .status-bar .battery-icon::after { content: ''; position: absolute; right: -3px; top: 50%; transform: translateY(-50%); width: 2px; height: 5px; background: #333; border-radius: 0 1px 1px 0; }
        .status-bar .battery-level { height: 6px; width: 14px; background: #333; border-radius: 1px; margin: 1px; }
        .header-bar { position: absolute; top: 48px; left: 0; right: 0; height: 52px; display: flex; align-items: center; justify-content: space-between; padding: 0 20px; z-index: 20; }
        .active { display: block; }
        .serif { font-family: 'Noto Serif SC', serif; }
        .blur-bg { filter: blur(4px) grayscale(50%); opacity: 0.4; }
    </style>
</head>
<body>

<div class="mobile-shell">
    
    <div class="status-bar">
        <span class="time">9:41</span>
        <div class="right-icons">
            <svg class="signal-bars" width="16" height="14" viewBox="0 0 16 14" fill="#333">
                <rect class="signal-bar" x="0" y="8" width="3" height="6" rx="1"/>
                <rect class="signal-bar" x="4" y="5" width="3" height="9" rx="1"/>
                <rect class="signal-bar" x="8" y="2" width="3" height="12" rx="1"/>
                <rect class="signal-bar" x="12" y="0" width="3" height="14" rx="1"/>
            </svg>
            <svg width="16" height="14" viewBox="0 0 24 18" fill="none" stroke="#333" stroke-width="1.5">
                <path d="M2 8 L8 8 L12 4 L16 8 L22 8"/>
                <circle cx="12" cy="14" r="2" fill="#333" stroke="none"/>
            </svg>
            <div class="battery">
                <div class="battery-icon"><div class="battery-level"></div></div>
            </div>
        </div>
    </div>
    
    <div class="header-bar">
        <span class="text-[#002FA7] font-semibold text-sm tracking-wider">BLUELINK</span>
        <button class="w-10 h-10 rounded-full bg-gray-100 flex items-center justify-center">
            <svg class="w-5 h-5 text-[#002FA7]" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"/>
            </svg>
        </button>
    </div>
    
    <!-- 1. 对话视界：线索锚定 -->
    <div id="v1" class="view active flex flex-col">
        <div class="px-6 flex-1 overflow-y-auto">
        
            <!-- 用户提问 (右侧) -->
            <div class="flex justify-end mb-6">
                <div class="bg-[#002FA7] text-white p-4 rounded-2xl rounded-tr-none text-sm max-w-[80%]">
                    如何理解微调技术（Fine-tuning）与 RAG 的边界？
             </div>
            </div>

            <!-- AI 回答 (左侧) -->
            <div class="space-y-6">
                <div class="bg-white p-4 rounded-2xl rounded-tl-none border border-black/5 shadow-sm text-sm text-gray-700 leading-relaxed max-w-[85%]">
                    微调改变的是模型的“表达习惯”，而 RAG 提供的是“事实依据”。微调无法解决实时知识更新问题，而 RAG 的局限在于检索的召回率。
                </div>

                <!-- 锚点卡片 (核心溯源路径) -->
                <div class="p-4 rounded-2xl bg-white border border-[#002FA7]/20 shadow-lg cursor-pointer hover:border-[#002FA7] transition-colors">
                    <div class="flex items-center gap-2 mb-2">
                        <span class="w-2 h-2 rounded-full bg-[#002FA7]"></span>
                        <span class="text-[10px] font-bold text-[#002FA7] uppercase tracking-wider">溯源引力线</span>
                    </div>
                    <p class="text-[13px] font-bold serif">《LLM 架构演进综述》第 4.2 节</p>
                    <p class="text-[11px] text-gray-500 mt-1">—— 对比分析微调与检索的权衡策略</p>
                </div>
            </div>
        </div>

    <!-- 底部对话框 -->
        <div class="p-4 bg-white border-t border-gray-100 flex items-center gap-3">
            <button class="text-gray-400">+</button>
            <div class="flex-1 bg-gray-50 rounded-full px-4 py-3 text-sm text-gray-400">输入你的疑问...</div>
            <button class="w-8 h-8 rounded-full bg-[#002FA7] flex items-center justify-center text-white">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M5 12h14M12 5l7 7-7 7"/>
                </svg>
            </button>
        </div>
    </div>  

<script>
    function show(n) {
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        document.getElementById('v' + n).classList.add('active');
    }
</script>
</body>
</html>
