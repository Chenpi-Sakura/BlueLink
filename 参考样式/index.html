<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>蓝链 BlueLink - 端侧AI认知溯源引擎</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Noto+Serif+SC:wght@400;600;700&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'parchment-50': '#FDFBF7',
                        'parchment-100': '#F4EFE6', 
                        'parchment-200': '#E8DFD0',
                        'ink-900': '#2C2B29',
                        'ink-600': '#66635D',
                        'ink-400': '#A39F98',
                        'brand-accent': '#002FA7',
                        'brand-accent-light': '#6B8DFF',
                        'brand-accent-bg': 'rgba(0, 47, 167, 0.08)',
                    },
                    fontFamily: {
                        'sans': ['Inter', 'ui-sans-serif', 'system-ui', '-apple-system', 'sans-serif'],
                        'serif': ['"Noto Serif SC"', 'ui-serif', 'Georgia', 'serif'],
                    },
                    borderRadius: {
                        '2xl': '1.25rem',
                        '3xl': '1.75rem',
                        '4xl': '2.5rem',
                    },
                    boxShadow: {
                        'soft': '0 8px 30px -4px rgba(44, 43, 41, 0.04)',
                        'float': '0 20px 40px -10px rgba(0, 47, 167, 0.15)',
                        'card': '0 4px 20px -2px rgba(44, 43, 41, 0.06)',
                    }
                }
            }
        }
    </script>
    <style>
        * {
            -webkit-tap-highlight-color: transparent;
            box-sizing: border-box;
        }
        
        body {
            -webkit-font-smoothing: antialiased;
            background-color: #F0EFEA;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            font-family: 'Inter', sans-serif;
        }

        .app-container {
            width: 100%;
            max-width: 393px;
            height: 854px;
            max-height: 90vh;
            background-color: #FDFBF7;
            border-radius: 44px;
            overflow: hidden;
            position: relative;
            border: 8px solid #1a1a1a;
            box-shadow: 0 50px 100px -20px rgba(0, 0, 0, 0.3);
        }

        .status-bar { 
            height: 48px; 
            padding: 0 24px; 
            display: flex; 
            align-items: center; 
            justify-content: space-between; 
            font-size: 14px; 
            font-family: -apple-system, BlinkMacSystemFont, sans-serif; 
            position: absolute; 
            top: 0; 
            left: 0; 
            right: 0; 
            z-index: 100; 
        }

        .hide-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .hide-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        .glass-panel {
            background: rgba(253, 251, 247, 0.7); 
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }
        
        .glass-pill {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.6);
        }

        .page {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            display: none;
            flex-direction: column;
            overflow: hidden;
        }
        
        .page.active {
            display: flex;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(100%); }
            to { opacity: 1; transform: translateY(0); }
        }

        .press-effect:active {
            transform: scale(0.96);
            transition: transform 0.1s ease;
        }

        .masonry-grid {
            column-count: 2;
            column-gap: 12px;
            padding: 0 16px 100px 16px;
        }
        
        .masonry-item {
            break-inside: avoid;
            margin-bottom: 12px;
            background-color: #ffffff;
        }

        .bottom-nav {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 70px;
            background: rgba(253, 251, 247, 0.95);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-top: 1px solid rgba(0, 0, 0, 0.05);
            display: flex;
            justify-content: space-around;
            align-items: center;
            z-index: 90;
            padding-bottom: 10px;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            cursor: pointer;
            padding: 8px 16px;
            border-radius: 12px;
            transition: all 0.2s ease;
        }
        
        .nav-item.active {
            color: #002FA7;
        }
        
        .nav-item:not(.active) {
            color: #A39F98;
        }

        .connector {
            position: absolute; 
            height: 2px; 
            background: #D1D1D1;
            transform-origin: left center; 
            z-index: 1; 
            transition: all 0.3s ease;
        }
        
        .connector.active { 
            background: #002FA7; 
            height: 3px; 
            box-shadow: 0 0 8px rgba(0, 47, 167, 0.5); 
        }

        .knowledge-node {
            position: absolute; 
            width: 52px; 
            height: 52px;
            background: #002FA7; 
            color: white;
            border-radius: 50%; 
            display: flex; 
            align-items: center; 
            justify-content: center;
            font-size: 11px; 
            font-weight: 600;
            z-index: 10; 
            cursor: pointer; 
            transition: all 0.3s ease;
            font-family: 'Inter', sans-serif;
        }
        
        .knowledge-node.focused { 
            background: #fff; 
            color: #002FA7; 
            border: 2px solid #002FA7;
            transform: scale(1.15);
            box-shadow: 0 8px 20px rgba(0, 47, 167, 0.3);
        }

        .anchor-card {
            transition: all 0.3s ease;
            cursor: pointer;
        }
        
        .anchor-card:hover {
            border-color: #002FA7;
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0, 47, 167, 0.15);
        }

        .spotlight-target {
            border-left: 4px solid #002FA7;
            padding: 16px;
            background: rgba(0, 47, 167, 0.04);
            border-radius: 0 12px 12px 0;
            margin: 20px 0;
            position: relative;
            transition: all 0.4s ease;
        }

        .fade-paragraph { 
            opacity: 0.25; 
            transition: opacity 0.4s ease; 
        }
        
        .fade-paragraph.full-opacity {
            opacity: 1;
        }

        .fold-strip {
            background: rgba(0, 47, 167, 0.08);
            padding: 12px;
            border-radius: 12px;
            color: #002FA7;
            font-size: 13px;
            text-align: center;
            margin: 20px 0;
            font-family: 'Inter', sans-serif;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .fold-strip:hover {
            background: rgba(0, 47, 167, 0.12);
        }

        .folded-content {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.4s ease;
        }

        .folded-content.expanded {
            max-height: 500px;
        }

        .typing-indicator span {
            display: inline-block;
            width: 6px;
            height: 6px;
            background: #002FA7;
            border-radius: 50%;
            margin: 0 2px;
            animation: typing 1.4s infinite ease-in-out;
        }
        
        .typing-indicator span:nth-child(1) { animation-delay: 0s; }
        .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
        .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }
        
        @keyframes typing {
            0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
            30% { transform: translateY(-4px); opacity: 1; }
        }

        .message-bubble {
            max-width: 85%;
            animation: messageIn 0.3s ease;
        }

        @keyframes messageIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .gravity-line {
            position: relative;
        }
        
        .gravity-line::before {
            content: '';
            position: absolute;
            left: 8px;
            top: -20px;
            width: 2px;
            height: 20px;
            background: linear-gradient(to bottom, transparent, #002FA7);
        }
    </style>
</head>
<body>

            </div>
        </div>

        <div id="page-chat" class="page">
            <header class="absolute top-0 w-full z-30 glass-panel pt-12 pb-3 px-4 border-b border-parchment-200/40">
                <div class="flex items-center gap-3">
                    <button class="p-2 -ml-2 text-ink-900 press-effect" onclick="navigateTo('home')">

                            <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/>

        function navigateTo(page) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById('page-' + page).classList.add('active');
            
            document.querySelectorAll('.nav-item').forEach(item => item.classList.remove('active'));
            const navItems = document.querySelectorAll('.nav-item');
            const pageMap = { 'home': 0, 'chat': 1, 'graph': 2, 'reader': 3 };
            if (navItems[pageMap[page]]) {
                navItems[pageMap[page]].classList.add('active');
            }

            if (page === 'graph') {
                setTimeout(renderGraph, 100);
            }
        }

        function renderDocumentList() {
            const container = document.getElementById('document-list');
            container.innerHTML = documents.map((doc, index) => `
                <div class="masonry-item rounded-3xl p-5 shadow-card border border-parchment-100/50 relative overflow-hidden group cursor-pointer press-effect" onclick="openDocument(${doc.id})">
                    <div class="font-sans text-[11px] text-ink-400 mb-3 flex items-center justify-between">
                        <span class="tracking-wider">${doc.date}</span>
                    </div>
                    <h3 class="font-serif font-bold ${index % 2 === 0 ? 'text-lg' : 'text-[17px]'} leading-tight mb-3 text-ink-900">${doc.title}</h3>
                    ${index % 2 === 1 ? '<div class="w-8 h-[1px] bg-parchment-200 mb-3"></div>' : ''}
                    <p class="text-[13px] text-ink-600 leading-relaxed">${doc.excerpt}</p>
                    ${doc.tags.length > 0 ? `
                        <div class="inline-block px-2.5 py-1 bg-parchment-50 rounded-lg font-sans text-[11px] text-ink-400 mt-3">
                            ${doc.tags.map(t => '#' + t).join(' ')}
                        </div>
                    ` : ''}
                </div>
            `).join('') + '<div class="h-24"></div>';
        }

        function openDocument(id) {
            navigateTo('reader');
        }

        function renderChatMessages() {
            const container = document.getElementById('chat-messages');
            container.innerHTML = chatHistory.map(msg => {
                if (msg.type === 'user') {
                    return `
                        <div class="flex justify-end message-bubble">
                            <div class="bg-brand-accent text-white p-4 rounded-2xl rounded-tr-none text-sm max-w-[85%] leading-relaxed">
                                ${msg.content}
                            </div>
                        </div>
                    `;
                } else {
                    return `
                        <div class="space-y-4 message-bubble">
                            <div class="bg-white p-4 rounded-2xl rounded-tl-none border border-black/5 shadow-sm text-sm text-ink-600 leading-relaxed max-w-[85%]">
                                ${msg.content}
                            </div>
                            ${msg.anchors ? msg.anchors.map(anchor => `

                                    <div class="flex items-center gap-2 mb-2">
                                        <span class="w-2 h-2 rounded-full bg-brand-accent"></span>
                                        <span class="text-[10px] font-bold text-brand-accent uppercase tracking-wider">溯源引力线</span>
                                    </div>
                                    <p class="text-[13px] font-bold serif text-ink-900">${anchor.title}</p>
                                    <p class="text-[11px] text-ink-400 mt-1">—— ${anchor.subtitle}</p>

                            `).join('') : ''}
                        </div>
                    `;
                }
            }).join('');
        }

        function sendMessage() {
            const input = document.getElementById('chat-input');
            const text = input.innerText.trim();
            if (!text) return;

            chatHistory.push({ type: 'user', content: text });
            input.innerText = '';
            renderChatMessages();

            setTimeout(() => {
                const chatContainer = document.getElementById('chat-container');
                chatContainer.scrollTop = chatContainer.scrollHeight;
            }, 50);

            setTimeout(() => {
                chatHistory.push({

            }, 1500);

        function openFromAnchor(docId) {
            navigateTo('reader');
        }

        function renderReaderContent() {
            const container = document.getElementById('reader-content');
            container.innerHTML = `
                <h1 class="font-serif text-2xl font-bold text-ink-900 mb-6">${readerContent.title}</h1>
                ${readerContent.paragraphs.map((p, i) => {
                    if (p.type === 'highlight') {
                        return `
                            <div class="spotlight-target" id="spotlight-${i}">
                                <span class="text-brand-accent text-[10px] font-sans font-semibold tracking-wide">溯源锚点：${p.anchor}</span>
                                <div class="mt-2">
                                    <strong class="text-ink-900">${p.text}</strong>
                                </div>
                            </div>
                        `;
                    } else if (p.type === 'fold') {
                        return `
                            <div class="fold-strip" onclick="toggleFold(this)">
                                ${p.label} <span class="arrow inline-block ml-1">▼</span>
                            </div>
                            <div class="folded-content">
                                <p class="text-[15px] text-ink-600 leading-relaxed font-serif fade-paragraph">${p.content}</p>
                            </div>
                        `;
                    } else {
                        return `<p class="text-[15px] text-ink-600 leading-relaxed font-serif mb-5 fade-paragraph ${p.faded ? '' : 'full-opacity'}">${p.text}</p>`;
                    }
                }).join('')}
                <div class="h-20"></div>
            `;

            container.onclick = (e) => {
                if (!e.target.closest('.fold-strip') && !e.target.closest('.spotlight-target')) {
                    clearSpotlight();
                }
            };
        }

        function toggleFold(element) {
            const content = element.nextElementSibling;
            const arrow = element.querySelector('.arrow');
            content.classList.toggle('expanded');
            arrow.style.transform = content.classList.contains('expanded') ? 'rotate(180deg)' : 'rotate(0)';
        }

        function clearSpotlight() {
            document.querySelectorAll('.fade-paragraph').forEach(p => {
                p.classList.add('full-opacity');
            });
            const highlights = document.querySelectorAll('.spotlight-target');
            highlights.forEach(h => {
                h.style.background = 'transparent';
                h.style.borderLeft = 'none';
                h.style.padding = '0';
                const label = h.querySelector('span');
                if (label) label.style.display = 'none';
            });
        }

        function renderGraph() {
            const canvas = document.getElementById('graph-canvas');
            const panel = document.getElementById('graph-panel');
            
            canvas.innerHTML = '';
            
            knowledgeGraph.connections.forEach(([from, to], idx) => {
                const fromNode = knowledgeGraph.nodes.find(n => n.id === from);
                const toNode = knowledgeGraph.nodes.find(n => n.id === to);
                
                const line = document.createElement('div');
                line.className = 'connector';
                line.dataset.from = from;
                line.dataset.to = to;
                
                const x1 = fromNode.x + 26;
                const y1 = fromNode.y + 26 + 60;
                const x2 = toNode.x + 26;
                const y2 = toNode.y + 26 + 60;
                
                const length = Math.sqrt(Math.pow(x2 - x1, 2) + Math.pow(y2 - y1, 2));
                const angle = Math.atan2(y2 - y1, x2 - x1) * 180 / Math.PI;
                
                line.style.left = x1 + 'px';
                line.style.top = y1 + 'px';
                line.style.width = length + 'px';
                line.style.transform = `rotate(${angle}deg)`;
                
                canvas.appendChild(line);
            });
            
            knowledgeGraph.nodes.forEach(node => {
                const el = document.createElement('div');
                el.className = 'knowledge-node';
                el.id = 'node-' + node.id;
                el.style.left = node.x + 'px';
                el.style.top = (node.y + 60) + 'px';
                el.innerText = node.label;
                el.onclick = () => focusNode(node.id);
                canvas.appendChild(el);
            });
        }

        function focusNode(nodeId) {
            document.querySelectorAll('.knowledge-node').forEach(n => n.classList.remove('focused'));
            document.getElementById('node-' + nodeId).classList.add('focused');
            
            document.querySelectorAll('.connector').forEach(line => {
                if (line.dataset.from === nodeId || line.dataset.to === nodeId) {
                    line.classList.add('active');
                } else {
                    line.classList.remove('active');
                }
            });
            
            const info = knowledgeGraph.nodeInfo[nodeId];
            const panel = document.getElementById('graph-panel');
            document.getElementById('panel-title').innerText = info.title;
            document.getElementById('panel-desc').innerText = info.desc;
            panel.style.transform = 'translateY(0)';
        }

        function init() {
            renderDocumentList();
            renderChatMessages();
            renderReaderContent();
            
            const homeScroll = document.getElementById('home-scroll');
            const header = document.querySelector('#page-home header');
            homeScroll.addEventListener('scroll', () => {
                header.style.boxShadow = homeScroll.scrollTop > 10 
                    ? '0 4px 20px -2px rgba(44, 43, 41, 0.05)' 
                    : 'none';
            });

            const chatInput = document.getElementById('chat-input');
            chatInput.addEventListener('keydown', (e) => {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    sendMessage();
                }
            });
        }

        document.addEventListener('DOMContentLoaded', init);
    </script>
