<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <title>BlueLink 知识图谱</title>
    <script src="echarts.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            width: 100%; height: 100%; min-height: 100vh; overflow: hidden;
            background: radial-gradient(circle at 50% 46%, rgba(0,47,167,0.30), transparent 30%),
                        radial-gradient(circle at 25% 22%, rgba(91,141,239,0.13), transparent 24%),
                        radial-gradient(circle at 80% 34%, rgba(250,247,242,0.08), transparent 20%),
                        #080F1F;
        }
        body::before {
            content: ""; position: fixed; inset: 0; pointer-events: none; opacity: 0.42;
            background-image: radial-gradient(circle, rgba(250,247,242,0.8) 1px, transparent 1.5px),
                              radial-gradient(circle, rgba(91,141,239,0.45) 1px, transparent 1.4px);
            background-size: 90px 90px, 140px 140px;
            background-position: 12px 18px, 48px 76px;
        }
        #main { position: absolute; inset: 0; width: 100vw; height: 100vh; min-height: 100vh; z-index: 10; background: transparent; }
        #empty { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center;
            color: #8D93A6; font: 14px sans-serif; pointer-events: none; z-index: 9; }
    </style>
</head>
<body>
<div id="main"></div>
<div id="empty">暂无图谱数据</div>
<script>
    // ── 全局状态 ──
    var mainEl = document.getElementById('main');
    var emptyView = document.getElementById('empty');
    var chart = null;
    var lastGraphData = null;
    var currentLayout = 'star';
    var resizeTimer = null;
    var pendingUpdate = false;

    // ── 确保容器高度 ──
    (function ensureHeight() {
        if (mainEl.clientHeight < 100) {
            var h = window.innerHeight || window.screen.height || 600;
            mainEl.style.height = h + 'px';
            mainEl.style.minHeight = h + 'px';
        }
    })();

    // ── 工具函数 ──
    function normalizeText(text) {
        return String(text || '').replace(/[《》]/g, '').trim();
    }
    function shortLabel(text, max) {
        var clean = normalizeText(text);
        var arr = Array.from(clean);
        return arr.length > max ? arr.slice(0, max).join('') + '…' : arr.join('');
    }
    function textWidth(label, fontSize, padding) {
        return Math.max(60, Array.from(label || '').length * (fontSize || 13) + (padding || 38));
    }
    function conceptSize(label, isCore) {
        var display = shortLabel(label, isCore ? 7 : 6);
        var w = textWidth(display, isCore ? 14 : 13, 40);
        w = Math.max(isCore ? 116 : 92, Math.min(isCore ? 168 : 148, w));
        return { width: w, height: isCore ? 46 : 40, display: display };
    }
    function documentLabel(label) {
        var clean = normalizeText(label);
        var chars = Array.from(clean);
        if (chars.length <= 4) return chars.join('');
        if (chars.length <= 8) return chars.slice(0, 4).join('') + '\n' + chars.slice(4, 8).join('');
        return chars.slice(0, 4).join('') + '\n' + chars.slice(4, 7).join('') + '…';
    }
    function inspirationLabel(label) {
        var clean = normalizeText(label);
        var m = clean.match(/#\d+/);
        return m ? '灵感 ' + m[0] : shortLabel(clean, 5);
    }
    function isCoreNode(id) {
        return id === 'concept-ai-origin' || id === 'concept-feynman' || id === 'concept-cognition';
    }
    function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }

    const RELATION_LABEL_MAP = {
        SUPPORT: '支撑',
        SUPPLEMENT: '补充',
        CHALLENGE: '质疑',
        CITE: '引用'
    };
    const RELATION_TEXT_COLOR_MAP = {
        SUPPORT: 'rgba(110,210,120,0.75)',
        SUPPLEMENT: 'rgba(90,150,255,0.75)',
        CHALLENGE: 'rgba(255,130,135,0.75)',
        CITE: 'rgba(180,190,210,0.65)'
    };

    function edgeStyleByType(type) {
        switch (type) {
            case 'SUPPORT':
                return { color: 'rgba(90,200,110,0.65)', width: 1.4, type: 'dashed', opacity: 0.65, curveness: 0.04 };
            case 'SUPPLEMENT':
                return { color: 'rgba(80,140,255,0.65)', width: 1.5, type: 'solid', opacity: 0.70, curveness: 0.04 };
            case 'CHALLENGE':
                return { color: 'rgba(255,120,125,0.60)', width: 1.4, type: 'dashed', opacity: 0.60, curveness: 0.04 };
            case 'CITE':
            default:
                return { color: 'rgba(180,190,210,0.50)', width: 1.2, type: 'dotted', opacity: 0.55, curveness: 0.04 };
        }
    }

    function pickMainEdges(nodes, edges, maxEdges) {
        maxEdges = maxEdges || 10;
        var nodeById = {};
        nodes.forEach(function (node) { nodeById[node.id] = node; });
        var relationPriority = { SUPPORT: 4, SUPPLEMENT: 3, CHALLENGE: 2, CITE: 1 };
        var dedupedByPair = {};

        function edgeScore(edge) {
            var source = edge.source || edge.sourceId;
            var target = edge.target || edge.targetId;
            var type = edge.relation || edge.relationType || 'CITE';
            var coreBonus = (isCoreNode(source) || isCoreNode(target)) ? 100 : 0;
            var confidence = Number(edge.confidence);
            if (!isFinite(confidence)) confidence = 0.5;
            return coreBonus + (relationPriority[type] || 0) * 10 + confidence;
        }

        edges.forEach(function (edge) {
            var source = edge.source || edge.sourceId;
            var target = edge.target || edge.targetId;
            if (!nodeById[source] || !nodeById[target] || source === target) return;
            var key = source < target ? source + '|' + target : target + '|' + source;
            if (!dedupedByPair[key] || edgeScore(edge) > edgeScore(dedupedByPair[key])) {
                dedupedByPair[key] = edge;
            }
        });

        var candidates = Object.keys(dedupedByPair).map(function (key) { return dedupedByPair[key]; });
        candidates.sort(function (a, b) { return edgeScore(b) - edgeScore(a); });

        var selected = [];
        var selectedKeys = {};
        var degree = {};
        function nodeLimit(id) {
            var node = nodeById[id] || {};
            if (isCoreNode(id)) return maxEdges;
            if (node.type === 'DOCUMENT' || node.type === 'INSPIRATION') return 1;
            return 2;
        }
        function tryAdd(edge) {
            if (!edge || selected.length >= maxEdges) return false;
            var source = edge.source || edge.sourceId;
            var target = edge.target || edge.targetId;
            var key = source < target ? source + '|' + target : target + '|' + source;
            if (selectedKeys[key]) return false;
            if ((degree[source] || 0) >= nodeLimit(source) || (degree[target] || 0) >= nodeLimit(target)) return false;
            selectedKeys[key] = true;
            degree[source] = (degree[source] || 0) + 1;
            degree[target] = (degree[target] || 0) + 1;
            selected.push(edge);
            return true;
        }

        ['SUPPORT', 'SUPPLEMENT', 'CHALLENGE', 'CITE'].forEach(function (type) {
            tryAdd(candidates.find(function (edge) {
                return (edge.relation || edge.relationType || 'CITE') === type;
            }));
        });
        candidates.forEach(tryAdd);
        return selected.slice(0, maxEdges);
    }

    // ── 核心子图筛选（最多 10 节点 + 10 边） ──
    function pickMainGraph(rawNodes, rawEdges, maxNodes) {
        maxNodes = maxNodes || 10;
        if (rawNodes.length <= maxNodes) return { nodes: rawNodes, edges: rawEdges };

        var coreIds = ['concept-ai-origin', 'concept-feynman', 'concept-cognition', 'concept-info-growth'];
        var pickedIds = {};
        var ordered = [];

        // 1. 核心概念
        coreIds.forEach(function (id) {
            var n = rawNodes.find(function (x) { return x.id === id; });
            if (n && !pickedIds[id]) { pickedIds[id] = true; ordered.push(n); }
        });

        // 2. 统计关联数
        var edgeCount = {};
        rawEdges.forEach(function (e) {
            var s = e.source || e.sourceId, t = e.target || e.targetId;
            edgeCount[s] = (edgeCount[s] || 0) + 1;
            edgeCount[t] = (edgeCount[t] || 0) + 1;
        });

        // 3. 与核心相连的节点，按关联数排序
        var connected = [];
        rawNodes.forEach(function (n) {
            if (pickedIds[n.id]) return;
            if (rawEdges.some(function (e) {
                var s = e.source || e.sourceId, t = e.target || e.targetId;
                return (s === n.id || t === n.id) && coreIds.some(function (c) { return s === c || t === c; });
            })) connected.push(n);
        });
        connected.sort(function (a, b) { return (edgeCount[b.id] || 0) - (edgeCount[a.id] || 0); });
        connected.forEach(function (n) {
            if (ordered.length >= maxNodes) return;
            pickedIds[n.id] = true;
            ordered.push(n);
        });

        // 4. 按关联数补充
        if (ordered.length < maxNodes) {
            rawNodes.filter(function (n) { return !pickedIds[n.id]; })
                .sort(function (a, b) { return (edgeCount[b.id] || 0) - (edgeCount[a.id] || 0); })
                .forEach(function (n) {
                    if (ordered.length >= maxNodes) return;
                    pickedIds[n.id] = true;
                    ordered.push(n);
                });
        }

        // 5. 过滤边 + 去重
        var seen = {};
        var filteredEdges = [];
        rawEdges.forEach(function (e) {
            var s = e.source || e.sourceId, t = e.target || e.targetId;
            if (!pickedIds[s] || !pickedIds[t]) return;
            var key = s < t ? s + '|' + t : t + '|' + s;
            if (seen[key]) return;
            seen[key] = true;
            filteredEdges.push(e);
        });

        // 最多 10 条边，优先与核心相连
        filteredEdges = pickMainEdges(ordered, filteredEdges, 10);

        return { nodes: ordered, edges: filteredEdges };
    }

    // ── 固定槽位模板布局 ──
    function assignMobileSlots(nodes, width, height) {
        var topSafe = 170, bottomSafe = 230, leftSafe = 44, rightSafe = 44;
        var graphTop = topSafe;
        var graphBottom = Math.max(graphTop + 200, height - bottomSafe);
        var graphH = graphBottom - graphTop;
        var cx = width * 0.5;
        var cy = graphTop + graphH * 0.48;

        var coreIds = ['concept-ai-origin', 'concept-feynman', 'concept-cognition'];

        var conceptSlots = [
            { x: width * 0.28, y: graphTop + graphH * 0.35 },
            { x: width * 0.72, y: graphTop + graphH * 0.34 },
            { x: width * 0.30, y: graphTop + graphH * 0.64 },
            { x: width * 0.70, y: graphTop + graphH * 0.66 }
        ];
        var docSlots = [
            { x: width * 0.18, y: graphTop + graphH * 0.18 },
            { x: width * 0.82, y: graphTop + graphH * 0.20 },
            { x: width * 0.50, y: graphTop + graphH * 0.85 }
        ];
        var inspSlots = [
            { x: width * 0.22, y: graphTop + graphH * 0.52 },
            { x: width * 0.78, y: graphTop + graphH * 0.54 }
        ];

        var result = {};
        var ci = 0, di = 0, ii = 0;

        nodes.forEach(function (n) {
            var t = n.type || '';
            if (t === 'DOCUMENT') {
                if (di < docSlots.length) result[n.id] = { x: docSlots[di].x, y: docSlots[di].y, fixed: true };
                di++;
            } else if (t === 'INSPIRATION') {
                if (ii < inspSlots.length) result[n.id] = { x: inspSlots[ii].x, y: inspSlots[ii].y, fixed: true };
                ii++;
            } else if (coreIds.indexOf(n.id) >= 0) {
                result[n.id] = { x: cx, y: cy, fixed: true };
            } else {
                if (ci < conceptSlots.length) result[n.id] = { x: conceptSlots[ci].x, y: conceptSlots[ci].y, fixed: true };
                ci++;
            }
        });

        // 如果核心概念不在 nodes 中，第一个概念放中心
        var hasCore = nodes.some(function (n) { return coreIds.indexOf(n.id) >= 0; });
        if (!hasCore) {
            var firstC = nodes.find(function (n) { return (n.type || '') !== 'DOCUMENT' && (n.type || '') !== 'INSPIRATION'; });
            if (firstC && result[firstC.id]) result[firstC.id] = { x: cx, y: cy, fixed: true };
        }
        return result;
    }

    // ── 环形坐标布局 ──
    function assignCircularSlots(nodes, width, height) {
        var graphTop = 170, graphBottom = Math.max(370, height - 230);
        var cx = width * 0.5;
        var cy = graphTop + (graphBottom - graphTop) * 0.48;
        var r = Math.min(width * 0.30, (graphBottom - graphTop) * 0.32);
        var result = {};
        nodes.forEach(function (n, i) {
            var a = (2 * Math.PI * i) / nodes.length - Math.PI / 2;
            result[n.id] = { x: cx + r * Math.cos(a), y: cy + r * Math.sin(a), fixed: true };
        });
        return result;
    }

    // ── 应用坐标到节点数据 ──
    function applyPositions(nodes, posMap) {
        return nodes.map(function (n) {
            var p = posMap[n.id];
            if (p) { n.x = p.x; n.y = p.y; n.fixed = true; }
            return n;
        });
    }

    // ── 构建 ECharts 配置 ──
    function buildGraphOption(displayNodes, displayEdges, layout) {
        var w = mainEl ? mainEl.clientWidth : 360;
        var h = mainEl ? mainEl.clientHeight : 600;

        var nodes = displayNodes.map(function (n) {
            var t = n.type || '';
            var rawName = n.name || n.label || '';
            switch (t) {
                case 'DOCUMENT':
                    return {
                        id: n.id, name: rawName, value: rawName, category: 0, typeLabel: '文献',
                        refId: n.refId, symbol: 'circle', symbolSize: 54,
                        itemStyle: {
                            color: '#E8F0FF', borderColor: '#F8FAFF', borderWidth: 1.5,
                            shadowBlur: 12, shadowColor: 'rgba(200,225,255,0.35)', opacity: 1
                        },
                        emphasis: {
                            itemStyle: {
                                shadowBlur: 11, shadowColor: 'rgba(220,235,255,0.34)',
                                borderColor: '#FFFFFF', borderWidth: 2
                            }
                        },
                        label: {
                            show: true, formatter: documentLabel(rawName), position: 'inside',
                            color: '#273142', fontSize: 10, fontWeight: 600,
                            align: 'center', verticalAlign: 'middle', lineHeight: 13
                        }
                    };
                case 'INSPIRATION':
                    return {
                        id: n.id, name: rawName, value: rawName, category: 1, typeLabel: '灵感',
                        refId: n.refId, symbol: 'diamond', symbolSize: 54,
                        itemStyle: {
                            color: '#E0B85A', borderColor: '#FFE08A', borderWidth: 1.8,
                            shadowBlur: 22, shadowColor: 'rgba(255,214,102,0.65)', opacity: 1
                        },
                        emphasis: {
                            itemStyle: {
                                shadowBlur: 28, shadowColor: 'rgba(255,224,138,0.85)',
                                borderColor: '#FFF0B5', borderWidth: 2.4
                            }
                        },
                        label: {
                            show: true, formatter: inspirationLabel(rawName), position: 'inside',
                            color: '#2C2614', fontSize: 10, fontWeight: 700,
                            align: 'center', verticalAlign: 'middle', lineHeight: 12
                        }
                    };
                default:
                    var isCore = isCoreNode(n.id);
                    var cs = conceptSize(rawName, isCore);
                    return {
                        id: n.id, name: rawName, value: rawName, category: 2, typeLabel: '概念',
                        refId: n.refId, symbol: 'roundRect', symbolSize: [cs.width, cs.height],
                        itemStyle: {
                            color: '#0B3FBF', borderColor: '#88BBFF', borderWidth: isCore ? 2.8 : 2.2,
                            shadowBlur: isCore ? 30 : 18,
                            shadowColor: 'rgba(80,150,255,0.7)', opacity: 1
                        },
                        emphasis: {
                            itemStyle: {
                                shadowBlur: isCore ? 36 : 24,
                                shadowColor: 'rgba(100,180,255,0.85)',
                                borderColor: '#B0D4FF', borderWidth: isCore ? 3.2 : 2.6
                            }
                        },
                        label: {
                            show: true, formatter: cs.display, position: 'inside',
                            color: '#F7F9FF', fontSize: isCore ? 14 : 13,
                            fontWeight: isCore ? 600 : 500, align: 'center',
                            verticalAlign: 'middle', lineHeight: isCore ? 18 : 16
                        }
                    };
            }
        });

        if (layout === 'star') {
            var posMap = assignMobileSlots(displayNodes, w, h);
            nodes = applyPositions(nodes, posMap);
        } else if (layout === 'circular') {
            var posMap = assignCircularSlots(displayNodes, w, h);
            nodes = applyPositions(nodes, posMap);
        }

        var links = displayEdges.map(function (e) {
            var rel = e.relation || e.relationType || 'CITE';
            return {
                source: e.source || e.sourceId,
                target: e.target || e.targetId,
                relationType: rel,
                lineStyle: edgeStyleByType(rel),
                label: {
                    show: true,
                    formatter: RELATION_LABEL_MAP[rel] || '',
                    color: RELATION_TEXT_COLOR_MAP[rel] || '#C6CCD8',
                    fontSize: 9,
                    fontWeight: 400,
                    backgroundColor: 'transparent',
                    borderWidth: 0,
                    padding: 0,
                    opacity: 0.85
                },
                symbol: ['none', 'arrow'],
                symbolSize: 4
            };
        });

        var isForce = layout === 'force';
        return {
            backgroundColor: 'transparent',
            animation: false,
            tooltip: { show: false },
            legend: { show: false },
            series: [{
                type: 'graph',
                layout: isForce ? 'force' : 'none',
                roam: true,
                draggable: false,
                scaleLimit: { min: 0.5, max: 1.8 },
                animation: false,
                animationDuration: 0,
                animationDurationUpdate: 0,
                data: nodes,
                links: links,
                categories: [
                    { name: '文献', itemStyle: { color: '#DDE8FF' }, symbol: 'circle', symbolSize: 42 },
                    { name: '灵感', itemStyle: { color: '#F0C674' }, symbol: 'diamond', symbolSize: 44 },
                    { name: '概念', itemStyle: { color: '#002FA7', borderColor: '#5B8DEF', borderWidth: 2 }, symbol: 'roundRect', symbolSize: [88, 38] }
                ],
                force: isForce ? { repulsion: 400, edgeLength: [100, 180], gravity: 0.06, friction: 0.6 } : undefined,
                label: { show: true, color: '#FAF7F2', fontSize: 11, position: 'inside' },
                labelLayout: { hideOverlap: true },
                edgeLabel: {
                    show: true,
                    formatter: function (params) {
                        return RELATION_LABEL_MAP[params.data.relationType] || '';
                    },
                    color: '#C6CCD8',
                    fontSize: 10,
                    fontWeight: 400,
                    rotate: 0,
                    backgroundColor: 'transparent',
                    borderWidth: 0,
                    padding: 0,
                    opacity: 0.85
                },
                lineStyle: { curveness: 0.04, width: 1.2, opacity: 0.55 },
                emphasis: {
                    focus: 'adjacency',
                    scale: true,
                    label: { show: true, fontSize: 13, fontWeight: 'bold' },
                    lineStyle: { width: 2.2 },
                    edgeLabel: {
                        show: true, fontSize: 10, fontWeight: 500,
                        backgroundColor: 'transparent', borderWidth: 0, padding: 0
                    }
                },
                blur: {
                    itemStyle: { opacity: 0.55 },
                    lineStyle: { opacity: 0.18 },
                    label: { opacity: 0.45 }
                }
            }]
        };
    }

    // ── 通知 Compose ──
    function notifyRendered(nodeCount, edgeCount) {
        if (window.BlueLinkBridge && window.BlueLinkBridge.onGraphRendered) {
            window.BlueLinkBridge.onGraphRendered(nodeCount, edgeCount);
        }
    }
    function notifyError(e) {
        if (window.BlueLinkBridge && window.BlueLinkBridge.onGraphError) {
            window.BlueLinkBridge.onGraphError(String(e && e.stack ? e.stack : e));
        }
    }

    // ── 初始化 chart ──
    if (mainEl) {
        chart = echarts.init(mainEl, null, { renderer: 'svg' });
        chart.setOption({ backgroundColor: 'transparent', animation: false, series: [{ type: 'graph', layout: 'none', roam: true, draggable: false, animation: false }] }, true);
    }

    // ====== 核心：接收 Compose 推送的数据 ======
    window.updateGraph = function (data) {
        if (pendingUpdate) return;
        pendingUpdate = true;
        try {
            var graphData = (typeof data === 'string') ? JSON.parse(data) : (data || {});
            var rawNodes = Array.isArray(graphData.nodes) ? graphData.nodes : [];
            var rawEdges = Array.isArray(graphData.edges) ? graphData.edges :
                (Array.isArray(graphData.links) ? graphData.links : []);

            // 主图筛选：只展示核心子图
            var mainGraph = pickMainGraph(rawNodes, rawEdges, 10);
            var displayNodes = mainGraph.nodes;
            var displayEdges = pickMainEdges(displayNodes, mainGraph.edges, 10);

            lastGraphData = data;
            if (rawNodes.length === 0) { lastGraphData = null; }
            emptyView.style.display = (displayNodes.length === 0) ? 'flex' : 'none';
            if (!chart || !mainEl) { pendingUpdate = false; return; }

            if (mainEl.clientHeight < 100) {
                mainEl.style.height = (window.innerHeight || window.screen.height || 600) + 'px';
                mainEl.style.minHeight = mainEl.style.height;
            }

            chart.clear();
            var option = buildGraphOption(displayNodes, displayEdges, currentLayout);
            chart.setOption(option, true);
            chart.resize();

            pendingUpdate = false;
            notifyRendered(displayNodes.length, displayEdges.length);
        } catch (e) {
            pendingUpdate = false;
            console.error('updateGraph error', e);
            emptyView.style.display = 'flex';
            notifyError(e);
        }
    };

    // ====== 布局切换（仅在 star / circular 之间切换） ======
    window.changeLayout = function (type) {
        var newLayout = type === 'circular' ? 'circular' : 'star';
        if (newLayout === currentLayout) return;
        currentLayout = newLayout;
        if (lastGraphData) { window.updateGraph(lastGraphData); }
    };

    // ====== 重置视图 ======
    window.resetView = function () {
        if (!lastGraphData || !chart) return;
        chart.clear();
        currentLayout = 'star';
        // 重置 zoom 和 center
        chart.setOption({ series: [{ zoom: 1, center: null }] });
        window.updateGraph(lastGraphData);
        setTimeout(function () { chart && chart.resize(); }, 120);
    };

    window.focusNode = function (nodeId) {
        if (!chart || nodeId == null) return;
        var opt = chart.getOption();
        if (!opt || !opt.series || !opt.series[0] || !opt.series[0].data) return;
        var idx = opt.series[0].data.findIndex(function (n) { return String(n.id) === String(nodeId); });
        if (idx < 0) return;
        chart.dispatchAction({ type: 'downplay', seriesIndex: 0 });
        chart.dispatchAction({ type: 'highlight', seriesIndex: 0, dataIndex: idx });
    };

    // ====== 节点点击 → Compose ======
    chart && chart.on('click', function (params) {
        if (params.dataType === 'node' && window.BlueLinkBridge && params.data.id != null) {
            window.BlueLinkBridge.onNodeClick(String(params.data.id));
        }
    });

    // ====== 缩放时调整关系标签字号（保持视觉稳定） ======
    chart && chart.on('graphRoam', function () {
        if (!chart) return;
        var opt = chart.getOption();
        if (!opt || !opt.series || !opt.series[0]) return;
        var zoom = (opt.series[0].zoom) || 1;
        zoom = Math.max(0.5, Math.min(1.8, zoom));
        var baseSize = 10;
        var zoomedSize = Math.round(baseSize * (1 / zoom));
        var finalSize = Math.max(7, Math.min(14, zoomedSize));
        chart.setOption({ series: [{ edgeLabel: { fontSize: finalSize } }] });
    });

    // ====== 窗口自适应 ======
    window.addEventListener('resize', function () {
        if (resizeTimer) clearTimeout(resizeTimer);
        resizeTimer = setTimeout(function () { chart && chart.resize(); }, 150);
    });
    if (window.ResizeObserver) {
        new ResizeObserver(function () { chart && chart.resize(); }).observe(mainEl);
    }

    window.addEventListener('error', function (event) {
        notifyError(String(event.message || 'Unknown JS error'));
    });

    if (window.BlueLinkBridge && window.BlueLinkBridge.onReady) {
        window.BlueLinkBridge.onReady();
    }
</script>
</body>
</html>
