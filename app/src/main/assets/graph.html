<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <title>BlueLink 知识图谱</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body, #main { width: 100%; height: 100%; background: #1E1E2E; overflow: hidden; }
    </style>
</head>
<body>
<div id="main"></div>
<script>
    // ====== ECharts 力导向图配置（V2.0 §9.4.1 / UI&UX §4.5） ======
    const chart = echarts.init(document.getElementById('main'));

    const option = {
        backgroundColor: '#1E1E2E',
        tooltip: {
            trigger: 'item',
            formatter: function (params) {
                if (params.dataType === 'node') {
                    return '<b>' + params.data.name + '</b><br/>类型: ' + (params.data.type || '未知');
                }
                return params.data.source + ' → ' + params.data.target;
            }
        },
        legend: [{
            data: ['文献', '灵感', '概念'],
            textStyle: { color: '#FAF7F2' },
            top: 16
        }],
        series: [{
            type: 'graph',
            layout: 'force',
            roam: true,
            draggable: true,
            label: {
                show: true,
                color: '#FAF7F2',
                fontSize: 12,
                position: 'right'
            },
            emphasis: {
                focus: 'adjacency',
                label: { fontSize: 14, fontWeight: 'bold' },
                lineStyle: { width: 3 }
            },
            force: {
                repulsion: 200,
                edgeLength: 80,
                gravity: 0.05
            },
            categories: [
                { name: '文献', itemStyle: { color: '#5B8DEF' }, symbol: 'circle', symbolSize: 30 },
                { name: '灵感', itemStyle: { color: '#F0C674' }, symbol: 'diamond', symbolSize: 28 },
                { name: '概念', itemStyle: { color: '#002FA7' }, symbol: 'roundRect', symbolSize: 32 }
            ],
            lineStyle: { color: '#6B6B6B', curveness: 0.1, width: 1.5, opacity: 0.7 },
            data: [],
            links: []
        }],
        animationDuration: 1000,
        animationEasingUpdate: 'quinticInOut'
    };

    chart.setOption(option);

    // ====== 接收 Compose 推送的数据 ======
    window.updateGraph = function (data) {
        if (!data || !data.nodes) return;

        // 安全解析：支持字符串和对象
        var graphData = (typeof data === 'string') ? JSON.parse(data) : data;

        option.series[0].data = graphData.nodes.map(function (n) {
            var categoryMap = { 'DOCUMENT': 0, 'INSPIRATION': 1, 'CONCEPT': 2 };
            return {
                id: n.id,
                name: n.name || n.label,
                category: categoryMap[n.type] !== undefined ? categoryMap[n.type] : 2,
                type: n.type,
                refId: n.refId,
                itemStyle: n.itemStyle ? n.itemStyle : undefined,
                symbol: n.symbol,
                symbolSize: n.type === 'CONCEPT' ? 36 : 28,
                value: n.name || n.label
            };
        });

        option.series[0].links = (graphData.edges || graphData.links || []).map(function (e) {
            return {
                source: e.source,
                target: e.target,
                relation: e.relation,
                lineStyle: e.lineStyle ? e.lineStyle : {
                    color: '#6B6B6B',
                    type: 'solid',
                    width: 1.5
                },
                symbol: ['none', 'arrow'],
                symbolSize: 6
            };
        });

        chart.setOption(option);
    };

    // ====== 布局切换 ======
    window.changeLayout = function (type) {
        option.series[0].layout = type || 'force';
        chart.setOption(option);
    };

    // ====== 节点点击 → Compose Bridge ======
    chart.on('click', function (params) {
        if (params.dataType === 'node' && window.BlueLinkBridge) {
            window.BlueLinkBridge.onNodeClick(params.data.id || params.data.name);
        }
    });

    // ====== 响应窗口大小变化 ======
    window.addEventListener('resize', function () {
        chart.resize();
    });
</script>
</body>
</html>
