<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <title>BlueLink 知识图谱</title>
    <script src="echarts.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            width: 100%;
            height: 100%;
            min-height: 100vh;
            background: transparent;
            overflow: hidden;
        }
        #main {
            position: absolute;
            inset: 0;
            width: 100vw;
            height: 100vh;
            min-height: 100vh;
            z-index: 10;
            background:
                /* 星云辉光 */
                radial-gradient(circle at 52% 48%, rgba(0,47,167,0.22), transparent 32%),
                radial-gradient(circle at 18% 22%, rgba(91,141,239,0.12), transparent 24%),
                radial-gradient(circle at 78% 28%, rgba(255,255,255,0.05), transparent 18%),
                radial-gradient(circle at 68% 72%, rgba(0,47,167,0.10), transparent 22%),
                radial-gradient(circle at 32% 68%, rgba(91,141,239,0.06), transparent 18%),
                /* 星点 */
                radial-gradient(1px 1px at 10% 15%, rgba(255,255,255,0.7), transparent),
                radial-gradient(1.2px 1.2px at 30% 25%, rgba(255,255,255,0.5), transparent),
                radial-gradient(1.5px 1.5px at 55% 8%, rgba(255,255,255,0.75), transparent),
                radial-gradient(1px 1px at 75% 18%, rgba(255,255,255,0.4), transparent),
                radial-gradient(1.2px 1.2px at 90% 10%, rgba(200,220,255,0.5), transparent),
                radial-gradient(1px 1px at 8% 40%, rgba(255,255,255,0.45), transparent),
                radial-gradient(1.5px 1.5px at 42% 52%, rgba(255,255,255,0.25), transparent),
                radial-gradient(1px 1px at 60% 60%, rgba(100,180,255,0.35), transparent),
                radial-gradient(1.2px 1.2px at 85% 55%, rgba(255,255,255,0.5), transparent),
                radial-gradient(1px 1px at 15% 70%, rgba(240,198,116,0.3), transparent),
                radial-gradient(1.5px 1.5px at 35% 80%, rgba(255,255,255,0.55), transparent),
                radial-gradient(1px 1px at 50% 90%, rgba(200,220,255,0.25), transparent),
                radial-gradient(1.2px 1.2px at 65% 75%, rgba(255,255,255,0.45), transparent),
                radial-gradient(1px 1px at 80% 85%, rgba(255,255,255,0.35), transparent),
                radial-gradient(1.5px 1.5px at 95% 40%, rgba(255,255,255,0.45), transparent),
                radial-gradient(1px 1px at 22% 45%, rgba(91,141,239,0.5), transparent),
                radial-gradient(1px 1px at 70% 22%, rgba(255,255,255,0.35), transparent),
                radial-gradient(1.2px 1.2px at 45% 35%, rgba(255,255,255,0.4), transparent),
                /* 底色 */
                #080F1F;
        }
        #empty {
            position: fixed; inset: 0; display: flex; align-items: center; justify-content: center;
            color: #8D93A6; font: 14px sans-serif; pointer-events: none; z-index: 9;
        }
    </style>
</head>
<body>
<div id="main"></div>
<div id="empty">暂无图谱数据</div>
<script>
    // ── 容器高度保证 ──
    (function ensureHeight() {
        var main = document.getElementById('main');
        if (main.clientHeight < 100) {
            main.style.height = (window.innerHeight || window.screen.height || 600) + 'px';
            main.style.minHeight = main.style.height;
        }
    })();

    const chart = echarts.init(document.getElementById('main'), null, { renderer: 'svg' });
    const emptyView = document.getElementById('empty');

    // 初始化空配置
    chart.setOption({
        backgroundColor: 'transparent',
        series: [{
            type: 'graph',
            layout: 'force',
            roam: true,
            draggable: true
        }]
    });

    // ====== 接收 Compose 推送的数据 ======
    window.updateGraph = function (data) {
        try {
            var graphData = (typeof data === 'string') ? JSON.parse(data) : (data || {});
            var rawNodes = Array.isArray(graphData.nodes) ? graphData.nodes : [];
            var rawEdges = Array.isArray(graphData.edges) ? graphData.edges :
                (Array.isArray(graphData.links) ? graphData.links : []);

            // 容器高度保护
            var mainEl = document.getElementById('main');
            if (mainEl.clientHeight < 100) {
                var h = window.innerHeight || window.screen.height || 600;
                mainEl.style.height = h + 'px';
                mainEl.style.minHeight = h + 'px';
            }

            var categoryMap = { 'DOCUMENT': 0, 'INSPIRATION': 1, 'CONCEPT': 2 };
            var typeLabelMap = { 'DOCUMENT': '文献', 'INSPIRATION': '灵感', 'CONCEPT': '概念' };
            var relationLabelMap = { 'SUPPORT': '支撑', 'CHALLENGE': '质疑', 'SUPPLEMENT': '补充', 'CITE': '引用' };

            var nodes = rawNodes.map(function (n) {
                var t = n.type || '';
                switch (t) {
                    case 'DOCUMENT':
                        return {
                            id: n.id, name: n.name || n.label || '', value: n.name || n.label || '',
                            category: 0, typeLabel: '文献', refId: n.refId,
                            symbol: 'circle', symbolSize: 48,
                            itemStyle: {
                                color: '#AFCBFF', borderColor: '#D8E7FF', borderWidth: 2,
                                shadowBlur: 14, shadowColor: 'rgba(175,203,255,0.4)'
                            },
                            label: { show: true, color: '#1E2838', fontSize: 10, fontWeight: 500 }
                        };
                    case 'INSPIRATION':
                        return {
                            id: n.id, name: n.name || n.label || '', value: n.name || n.label || '',
                            category: 1, typeLabel: '灵感', refId: n.refId,
                            symbol: 'diamond', symbolSize: 50,
                            itemStyle: {
                                color: '#F0C674', borderColor: '#FFE08A', borderWidth: 2,
                                shadowBlur: 16, shadowColor: 'rgba(240,198,116,0.45)'
                            },
                            label: { show: true, color: '#FAF7F2', fontSize: 10, fontWeight: 500 }
                        };
                    default:
                        return {
                            id: n.id, name: n.name || n.label || '', value: n.name || n.label || '',
                            category: 2, typeLabel: '概念', refId: n.refId,
                            symbol: 'roundRect', symbolSize: [92, 44],
                            itemStyle: {
                                color: '#002FA7', borderColor: '#5B8DEF', borderWidth: 2.5,
                                shadowBlur: 20, shadowColor: 'rgba(54,117,255,0.55)'
                            },
                            label: { show: true, color: '#FAF7F2', fontSize: 11, fontWeight: 600 }
                        };
                }
            });

            var links = rawEdges.map(function (e) {
                var rel = e.relation || '';
                var lineColor, lineType;
                switch (rel) {
                    case 'SUPPORT':    lineColor = '#34A853'; lineType = 'dashed'; break;
                    case 'CHALLENGE':  lineColor = '#EA4335'; lineType = 'dashed'; break;
                    case 'SUPPLEMENT': lineColor = '#002FA7'; lineType = 'solid';  break;
                    case 'CITE':       lineColor = '#888888'; lineType = 'dotted'; break;
                    default:           lineColor = '#6B6B6B'; lineType = 'solid';
                }
                return {
                    source: e.source || e.sourceId,
                    target: e.target || e.targetId,
                    relationLabel: relationLabelMap[rel] || '',
                    lineStyle: {
                        color: lineColor,
                        type: lineType,
                        width: 1.5,
                        opacity: 0.75
                    },
                    symbol: ['none', 'arrow'],
                    symbolSize: 6
                };
            });

            emptyView.style.display = (rawNodes.length === 0) ? 'flex' : 'none';

            chart.setOption({
                backgroundColor: 'transparent',
                tooltip: {
                    trigger: 'item',
                    formatter: function (params) {
                        if (params.dataType === 'node') {
                            return '<b>' + (params.data.name || '') + '</b><br/>类型：' + (params.data.typeLabel || '未知');
                        }
                        return (params.data.source || '') + ' → ' + (params.data.target || '');
                    }
                },
                legend: { show: false },
                series: [{
                    type: 'graph',
                    layout: 'force',
                    roam: true,
                    draggable: true,
                    data: nodes,
                    links: links,
                    categories: [
                        { name: '文献', itemStyle: { color: '#AFCBFF' }, symbol: 'circle', symbolSize: 48 },
                        { name: '灵感', itemStyle: { color: '#F0C674' }, symbol: 'diamond', symbolSize: 50 },
                        { name: '概念', itemStyle: { color: '#002FA7', borderColor: '#5B8DEF', borderWidth: 2.5 }, symbol: 'roundRect', symbolSize: [92, 44] }
                    ],
                    force: { repulsion: 650, edgeLength: [140, 260], gravity: 0.015, friction: 0.55 },
                    label: {
                        show: true,
                        color: '#FAF7F2',
                        fontSize: 11,
                        position: 'inside'
                    },
                    labelLayout: { hideOverlap: true, moveOverlap: 'shiftY' },
                    edgeLabel: { show: false },
                    emphasis: {
                        focus: 'adjacency',
                        label: { show: true, fontSize: 14, fontWeight: 'bold' },
                        lineStyle: { width: 3 },
                        edgeLabel: { show: true }
                    }
                }]
            }, true);

            chart.resize();
            requestAnimationFrame(function () { chart.resize(); });
            setTimeout(function () { chart.resize(); }, 200);
            setTimeout(function () { chart.resize(); }, 600);

            if (window.BlueLinkBridge && window.BlueLinkBridge.onGraphRendered) {
                window.BlueLinkBridge.onGraphRendered(nodes.length, links.length);
            }
        } catch (e) {
            console.error('updateGraph error', e);
            emptyView.style.display = 'flex';
            if (window.BlueLinkBridge && window.BlueLinkBridge.onGraphError) {
                window.BlueLinkBridge.onGraphError(String(e && e.stack ? e.stack : e));
            }
        }
    };

    // ====== 布局切换 ======
    window.changeLayout = function (type) {
        chart.setOption({ series: [{ layout: type === 'circular' ? 'circular' : 'force' }] });
    };

    window.resetView = function () {
        try {
            chart.setOption({ series: [{ center: null, zoom: 1 }] });
            chart.resize();
        } catch (e) { console.error('resetView error', e); }
    };

    window.focusNode = function (nodeId) {
        if (nodeId == null) return;
        var idx = chart.getOption().series[0].data.findIndex(function (n) {
            return String(n.id) === String(nodeId);
        });
        if (idx < 0) return;
        chart.dispatchAction({ type: 'downplay', seriesIndex: 0 });
        chart.dispatchAction({ type: 'highlight', seriesIndex: 0, dataIndex: idx });
    };

    // ====== 节点点击 → Compose ======
    chart.on('click', function (params) {
        if (params.dataType === 'node' && window.BlueLinkBridge && params.data.id != null) {
            window.BlueLinkBridge.onNodeClick(String(params.data.id));
        }
    });

    // ====== 窗口自适应 ======
    window.addEventListener('resize', function () { chart.resize(); });

    if (window.ResizeObserver) {
        new ResizeObserver(function () { chart.resize(); })
            .observe(document.getElementById('main'));
    }

    window.addEventListener('error', function (event) {
        if (window.BlueLinkBridge && window.BlueLinkBridge.onGraphError) {
            window.BlueLinkBridge.onGraphError(String(event.message || 'Unknown JS error'));
        }
    });

    if (window.BlueLinkBridge && window.BlueLinkBridge.onReady) {
        window.BlueLinkBridge.onReady();
    }
</script>
</body>
</html>
