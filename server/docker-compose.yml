# BlueLink 后端 — 生产部署
# 使用方法：docker compose up -d
# 首次启动会自动创建数据库并执行 seed

services:
  db:
    image: pgvector/pgvector:pg17
    container_name: bluelink-db
    environment:
      POSTGRES_DB: bluelink
      POSTGRES_USER: bluelink
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-bluelink}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bluelink -d bluelink"]
      interval: 5s
      timeout: 3s
      retries: 5

  app:
    build: .
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://bluelink:${POSTGRES_PASSWORD:-bluelink}@db:5432/bluelink
      LLM_API_KEY: ${LLM_API_KEY:?请设置 LLM_API_KEY}
      LLM_BASE_URL: ${LLM_BASE_URL:-https://api.deepseek.com/v1}
      LLM_CHAT_MODEL: ${LLM_CHAT_MODEL:-deepseek-chat}
      LLM_EMBED_MODEL: ${LLM_EMBED_MODEL:-embedding-v1}
      ENV: ${ENV:-production}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000,http://localhost:5173}
    ports:
      - "8000:8000"
    volumes:
      - uploads:/app/uploads
      - vectors:/app/vectors
    restart: unless-stopped

volumes:
  pgdata:
  uploads:
  vectors:
